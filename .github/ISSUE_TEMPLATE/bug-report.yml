name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Security vulnerabilities must be reported privately as described in SECURITY.md.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong, and what is the impact?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Protocol version, Python package version, or commit SHA.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, deployment mode, storage adapter, and other relevant details.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or additional context
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched for existing reports of this issue.
          required: true
        - label: This report does not disclose a security vulnerability.
          required: true
