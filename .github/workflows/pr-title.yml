name: Conventional PR title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate title
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Conventional Commits format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node <<'NODE'
          const title = process.env.PR_TITLE ?? "";
          const conventionalTitle = /^[a-z][a-z0-9-]*(?:\([a-z0-9._/-]+\))?!?: \S.*$/u;

          if (conventionalTitle.test(title)) {
            console.log(`Valid Conventional Commits title: ${title}`);
            process.exit(0);
          }

          console.error(`Invalid pull request title: ${JSON.stringify(title)}`);
          console.error("");
          console.error("Expected: <type>[optional scope][!]: <description>");
          console.error("");
          console.error("Examples:");
          console.error("  feat(scheduler): add weighted group fairness");
          console.error("  fix!: reject stale session epochs");
          console.error("  docs: explain protocol pinning");
          console.error("");
          console.error("Specification: https://www.conventionalcommits.org/en/v1.0.0/");
          process.exit(1);
          NODE

      - name: Check repository vocabulary
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const rules = [
            {
              label: "retired acronym",
              pattern: new RegExp(`\\b${["AW", "GP"].join("")}\\b`, "iu"),
            },
            {
              label: "retired expanded name",
              pattern: new RegExp(
                `\\b${["Agent", "Workgroup", "Protocol"].join("[\\s_-]+")}\\b`,
                "iu",
              ),
            },
            {
              label: "incomplete product display name",
              pattern: new RegExp(
                `${["Mission", "Weave"].join("")}(?!Protocol)`,
                "u",
              ),
              policyCases: {
                rejected: [
                  ["Mission", "Weave"].join(""),
                  ["Mission", "Weave", "-CLI"].join(""),
                  ["Mission", "Weave", "_ENV"].join(""),
                  ["prefix", "Mission", "Weave", "Client"].join(""),
                ],
                allowed: [
                  ["Mission", "Weave", "Protocol"].join(""),
                  ["Mission", "Weave", "Protocol", "Client"].join(""),
                ],
              },
            },
            {
              label: "incomplete product machine identifier",
              pattern: new RegExp(
                `${["mission", "weave"].join("")}(?!protocol)`,
                "u",
              ),
              policyCases: {
                rejected: [
                  ["mission", "weave"].join(""),
                  ["mission", "weave", "-cli"].join(""),
                  ["mission", "weave", "_env"].join(""),
                  ["prefix", "mission", "weave", "client"].join(""),
                ],
                allowed: [
                  ["mission", "weave", "protocol"].join(""),
                  ["mission", "weave", "protocol", "_client"].join(""),
                ],
              },
            },
            {
              label: "retired decision-record shorthand",
              pattern: new RegExp(`\\b${["A", "DR"].join("")}s?\\b`, "iu"),
            },
            {
              label: "retired decision-record directory",
              pattern: new RegExp(
                ["docs", ["a", "dr"].join("")].join("[/\\\\]+"),
                "iu",
              ),
            },
            {
              label: "retired decision-record phrase",
              pattern: new RegExp(
                `\\b${["architecture", "decision", "record"].join("[\\s_-]+")}s?\\b`,
                "iu",
              ),
            },
          ];

          const productRules = rules.filter((rule) => rule.policyCases);

          if (
            productRules.length !== 2 ||
            productRules.some(
              (rule) =>
                rule.policyCases.rejected.some((value) => !rule.pattern.test(value)) ||
                rule.policyCases.allowed.some((value) => rule.pattern.test(value)),
            )
          ) {
            throw new Error("Product display-name policy self-test failed.");
          }

          const failures = [];

          function inspect(label, value) {
            String(value ?? "")
              .split(/\r?\n/u)
              .forEach((line, index) => {
                for (const rule of rules) {
                  if (rule.pattern.test(line)) {
                    failures.push(`${label}:${index + 1}: ${rule.label}`);
                  }
                }
              });
          }

          const trackedFiles = execFileSync("git", ["ls-files", "-z"])
            .toString("utf8")
            .split("\0")
            .filter(Boolean);

          for (const file of trackedFiles) {
            inspect(`path:${file}`, file);
            const contents = fs.readFileSync(file);
            if (!contents.includes(0)) {
              inspect(file, contents.toString("utf8"));
            }
          }

          inspect("pull-request-title", process.env.PR_TITLE);
          inspect("pull-request-body", process.env.PR_BODY);

          if (failures.length > 0) {
            console.error("Repository vocabulary policy violations:");
            for (const failure of failures) {
              console.error(`  ${failure}`);
            }
            process.exit(1);
          }

          console.log("Repository vocabulary policy passed.");
          NODE
